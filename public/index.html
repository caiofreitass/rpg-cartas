<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RPG de Cartas</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0b0b0f;
color:white;
font-family:Inter;
text-align:center;
}

h1{
font-family:'Press Start 2P';
color:#00ffd5;
margin-top:30px;
}

button{
padding:10px 15px;
border-radius:8px;
border:none;
cursor:pointer;
}

input{
padding:10px;
border-radius:6px;
border:none;
margin:5px;
}

/* LOGIN */

#loginPanel{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000cc;
display:flex;
align-items:center;
justify-content:center;
}

.loginBox{
background:#111;
padding:30px;
border-radius:10px;
width:300px;
}

.loginBox input{
width:90%;
}

/* MENU */

#menu{
display:none;
margin-top:40px;
}

.menuBtn{
background:#1b1b2a;
padding:20px;
margin:10px auto;
width:250px;
border-radius:10px;
cursor:pointer;
}

.menuBtn:hover{
background:#292940;
}

/* SCREENS */

.screen{
display:none;
margin-top:20px;
}

/* CHAT */

#chatMessages{
height:150px;
overflow:auto;
background:#111;
padding:10px;
margin-bottom:10px;
}

</style>

</head>

<body>

<h1>🃏 RPG de Cartas</h1>

<!-- LOGIN -->

<div id="loginPanel">

<div class="loginBox">

<h3>Login</h3>

<input id="username" placeholder="Usuário">

<input id="password" type="password" placeholder="Senha">

<br>

<button id="btnLogin">Login</button>
<button id="btnRegister">Registrar</button>

<p id="loginMsg"></p>

</div>

</div>

<!-- MENU -->

<div id="menu">

<div class="menuBtn" id="btnArena">
ARENA
</div>

<div class="menuBtn" id="btnFriends">
AMIGOS
</div>

<div class="menuBtn" id="btnHouse">
CASA
</div>

<a href="world.html" style="text-decoration:none;color:white;">
<div class="menuBtn">
WORLD
</div>
</a>

</div>

<!-- ARENA -->

<div id="arena" class="screen">

<h2>Arena</h2>

<div id="chatMessages"></div>

<input id="chatInput" placeholder="Mensagem">

<button id="sendChat">Enviar</button>

<br><br>

<button onclick="voltarMenu()">Voltar</button>

</div>

<!-- FRIENDS -->

<div id="friends" class="screen">

<h2>Amigos</h2>

<input id="friendInput" placeholder="Nome do amigo">

<button>Adicionar</button>

<div id="friendsList"></div>

<br>

<button onclick="voltarMenu()">Voltar</button>

</div>

<!-- HOUSE -->

<div id="house" class="screen">

<h2>Casa</h2>

<p>Inventário vazio</p>

<button onclick="voltarMenu()">Voltar</button>

</div>

<script>

/* LOGIN */

const loginPanel = document.getElementById("loginPanel")
const menu = document.getElementById("menu")

document.getElementById("btnLogin").onclick = () => {

let user = document.getElementById("username").value

if(user === ""){
document.getElementById("loginMsg").innerText = "Digite um usuário"
return
}

loginPanel.style.display = "none"
menu.style.display = "block"

}

/* REGISTER */

document.getElementById("btnRegister").onclick = () => {

document.getElementById("loginMsg").innerText = "Conta criada (simulação)"

}

/* MENU */

const arena = document.getElementById("arena")
const friends = document.getElementById("friends")
const house = document.getElementById("house")

document.getElementById("btnArena").onclick = () => {

menu.style.display="none"
arena.style.display="block"

}

document.getElementById("btnFriends").onclick = () => {

menu.style.display="none"
friends.style.display="block"

}

document.getElementById("btnHouse").onclick = () => {

menu.style.display="none"
house.style.display="block"

}

/* VOLTAR */

function voltarMenu(){

arena.style.display="none"
friends.style.display="none"
house.style.display="none"

menu.style.display="block"

}

/* CHAT */

document.getElementById("sendChat").onclick = () => {

let input = document.getElementById("chatInput")
let chat = document.getElementById("chatMessages")

if(input.value === "") return

let msg = document.createElement("div")

msg.innerText = input.value

chat.appendChild(msg)

input.value = ""

}

</script>

</body>

</html>
